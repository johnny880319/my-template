pre-commit:
  parallel: true
  commands:
    # python
    python-lint:
      root: "python/"
      glob: "**/*.py"
      run: uv run ruff check --fix {staged_files} && uv run ruff format {staged_files}
      stage_fixed: true

    # go
    go-lint-typecheck:
      root: "go/"
      glob: "**/*.go"
      run: golangci-lint run --fix
      stage_fixed: true

    # typescript
    typescript-lint:
      root: "typescript/"
      glob: "**/*.{ts,tsx}"
      run: pnpm biome check --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    # python
    python-typecheck:
      root: "python/"
      glob: "**/*.py"
      run: uv run pyright
    python-test:
      root: "python/"
      glob: "**/*.py"
      run: uv run pytest

    # go
    go-test:
      root: "go/"
      glob: "**/*.go"
      run: go test -short ./...

    # typescript
    typescript-typecheck:
      root: "typescript/"
      glob: "**/*.{ts,tsx}"
      run: pnpm tsc --noEmit
    typescript-test:
      root: "typescript/"
      glob: "**/*.{ts,tsx}"
      run: pnpm vitest run
