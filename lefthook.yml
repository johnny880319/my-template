# NOTE:
# These hooks assume a monorepo layout with `python-codebase/`, `go-codebase/`, `rust-codebase/`, and `typescript-codebase/` folders.
# If you rename folders or flatten language code to repository root, update each `root:` path below.

pre-commit:
  parallel: true
  commands:
    # python
    python-lint:
      root: "python-codebase/"
      glob: "**/*.py"
      run: uv run ruff check --fix {staged_files} && uv run ruff format {staged_files}
      stage_fixed: true

    # go
    go-lint-typecheck:
      root: "go-codebase/"
      glob: "**/*.go"
      run: golangci-lint run --fix
      stage_fixed: true

    # rust
    rust-lint:
      root: "rust-codebase/"
      glob: "**/*.rs"
      run: cargo clippy --fix --allow-dirty --allow-staged
      stage_fixed: true
    rust-format:
      root: "rust-codebase/"
      glob: "**/*.rs"
      run: cargo fmt
      stage_fixed: true

    # typescript
    typescript-lint:
      root: "typescript-codebase/"
      glob: "**/*.{ts,tsx}"
      run: pnpm biome check --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    # python
    python-typecheck:
      root: "python-codebase/"
      glob: "**/*.py"
      run: uv run pyright
    python-test:
      root: "python-codebase/"
      glob: "**/*.py"
      run: uv run pytest

    # go
    go-test:
      root: "go-codebase/"
      glob: "**/*.go"
      run: go test -short ./...

    # rust
    rust-test:
      root: "rust-codebase/"
      glob: "**/*.rs"
      run: cargo test

    # typescript
    typescript-typecheck:
      root: "typescript-codebase/"
      glob: "**/*.{ts,tsx}"
      run: pnpm tsc --noEmit
    typescript-test:
      root: "typescript-codebase/"
      glob: "**/*.{ts,tsx}"
      run: pnpm vitest run
