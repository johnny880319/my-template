# NOTE:
# This workflow is designed for a monorepo layout where Python code lives in `python/`.
# If Python files are moved to repository root:
# 1) Remove `on.push.paths` / `on.pull_request.paths`.
# 2) Remove `defaults.run.working-directory`.
# 3) Update `cache-dependency-glob` and `python-version-file` paths.

name: Python CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'python/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'python/**'
      - '.github/workflows/python-ci.yml'

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./python

    steps:
      - uses: actions/checkout@v6

      - name: Set up Environment
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "python/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "python/.python-version"

      - name: Sync dependencies
        run: uv sync --all-extras --dev --locked

      - name: Lint and Format Check
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type Check
        run: uv run pyright

      - name: Run Tests
        run: uv run pytest
